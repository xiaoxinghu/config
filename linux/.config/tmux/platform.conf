# Linux-specific tmux config, sourced by shared/.config/tmux/tmux.conf if present.

set-option -g default-shell /usr/bin/zsh
set-option -g default-command /usr/bin/zsh

# Copy to the system clipboard. Relies on `set -g set-clipboard on` (OSC 52),
# so no external tool (xclip/wl-copy) is required.
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection-and-cancel
